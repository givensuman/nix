# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  - type: script
    snippets:
      # Add Docker CE repository
      - |
        dnf5 config-manager addrepo --from-repofile \
        https://download.docker.com/linux/fedora/docker-ce.repo

  - type: dnf
    install:
      packages:
        - buildah
        - containerd.io
        - distrobox
        - docker-buildx-plugin
        - docker-ce
        - docker-ce-cli
        - docker-compose-plugin
        - podlet
        - podman-compose
        - podman-remote
        - skopeo
        - libvirt
        - qemu-kvm
        - virt-manager
        - virt-viewer
        - virt-install
    remove:
      packages:
        - toolbox # Prefer distrobox

  - type: systemd
    system:
      enabled:
        # Services installed above
        - containerd.service
        - podman.service
        - docker.service
        - libvirtd.service
        # Services in /usr/lib/systemd/system
        - docker-rootless-setup.service
        - libvirtd-fix.service

  - type: script
    snippets:
      - rm -rf /etc/yum.repos.d/docker-ce.repo
